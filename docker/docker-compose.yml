services:
  hivescale-api:
    image: ghcr.io/macnite/hivescale-api:latest
    depends_on:
      hivescale-db:
        condition: service_healthy
    environment:
      API_KEY: Super-Secret-Key
      DATABASE_URL: postgresql://hivescale:Strong-Password@hivescale-db:5432/hivescale
      TZ: Europe/Berlin
    ports:
      - "31115:8000"
    restart: unless-stopped

  hivescale-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hivescale
      POSTGRES_USER: hivescale
      POSTGRES_PASSWORD: Strong-Password
      TZ: Europe/Berlin
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U hivescale -d hivescale
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - /mnt/path-to-db-data:/var/lib/postgresql/data