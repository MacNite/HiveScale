; PlatformIO compiles every .cpp under src/ automatically, so the split below
; needs no manual file list. Adjust board/lib_deps to match your hardware.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
    -std=gnu++17

lib_deps =
    bogde/HX711
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    adafruit/Adafruit SHT4x Library
    adafruit/RTClib
    bblanchon/ArduinoJson
    ; Optional features — uncomment as needed:
    ; adafruit/Adafruit INA219
    ; sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library
    ; kosme/arduinoFFT
