[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Keep OTA, but use almost all 4MB flash for two large OTA app slots.
; The firmware stores measurement data on SD, so the internal SPIFFS area can be tiny.
board_build.partitions = partitions_4mb_ota_no_fs.csv

; Make the build intent explicit. Release is PlatformIO's default, but keeping it
; here prevents accidental debug-size builds.
build_type = release

; Remove Arduino core log strings from the final image where possible.
build_flags =
  -DCORE_DEBUG_LEVEL=0

lib_deps =
  bogde/HX711
  paulstoffregen/OneWire
  milesburton/DallasTemperature
  adafruit/Adafruit SHT4x Library
  adafruit/RTClib
  bblanchon/ArduinoJson